name: linux-build-and-integration-tests

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]


env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
  
jobs:
  linux-build-and-integration-tests:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: [self-hosted, Linux]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        clean: false
        fetch-depth: 0
    
    - name: Unshallow vcpkg submodule
      run: |
        cd external/vcpkg
        git fetch --unshallow || true
        cd ../..
    
    - name: Install Packages
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev libgl1-mesa-dev libglu-dev
        
    - name: Install CUDA (via NVIDIA's repo)
      run: |
        sudo apt-get install -y gnupg software-properties-common wget
        wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get install -y cuda-compiler-13-0

    - name: Add CUDA to PATH
      run: |
        echo "/usr/local/cuda/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        
    - name: Bootstrap vcpkg
      run: |
        pushd external/vcpkg
        ./bootstrap-vcpkg.sh -disableMetrics
        popd

    - name: Configure CMake
      run: >
        cmake -S . -B build
        -DCMAKE_TOOLCHAIN_FILE=external/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc

    - name: Build
      run: cmake --build build -j32
      
    - name: Run Tests
      run: |
        cd build
        ./EngineInterfaceTests
        ./NetworkTests
        ./PersisterTests

    - name: Check for engine source changes
      id: engine_changes
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch origin ${{ github.base_ref }} 2>/dev/null || true
          BASE_SHA=$(git merge-base HEAD origin/${{ github.base_ref }} 2>/dev/null || echo "")
        else
          BASE_SHA="${{ github.event.before }}"
        fi
        if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- \
            source/EngineInterface \
            source/EngineImpl \
            source/EngineKernels \
            source/EngineTestData \
            source/EngineTests)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Check previous EngineTests result
      id: previous_engine_tests
      if: steps.engine_changes.outputs.changed != 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const branch = context.payload.pull_request?.head?.ref || context.ref.replace('refs/heads/', '');
          const runs = await github.paginate(
            github.rest.actions.listWorkflowRuns,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ubuntu-ci.yml',
              branch,
              status: 'completed',
              per_page: 100,
            }
          );

          for (const run of runs) {
            if (run.id === context.runId) {
              continue;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100,
              }
            );

            for (const job of jobs) {
              const step = job.steps?.find(step => step.name === 'Run EngineTests');
              if (!step || step.conclusion === 'skipped' || step.conclusion == null) {
                continue;
              }

              const failed = step.conclusion !== 'success';
              core.info(`Last executed EngineTests step conclusion on branch ${branch}: ${step.conclusion} (run ${run.id})`);
              core.setOutput('failed', failed ? 'true' : 'false');
              return;
            }
          }

          core.info(`No previous executed EngineTests step found on branch ${branch}.`);
          core.setOutput('failed', 'false');

    - name: Run EngineTests
      if: steps.engine_changes.outputs.changed == 'true' || steps.previous_engine_tests.outputs.failed == 'true'
      run: |
        cd build
        ./EngineTests
