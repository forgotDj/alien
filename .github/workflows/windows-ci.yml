name: windows-build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:


env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MCP_AUTH_TOKEN: ${{ secrets.MCP_AUTH_TOKEN }}
  
jobs:
  windows-build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: [self-hosted, Windows]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        clean: true

    - name: Check for recent changes
      id: recent_changes
      shell: pwsh
      run: |
        $recentCommit = git log --since="24 hours ago" --oneline -n 1
        if ($recentCommit) {
          "should_run=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        } else {
          "should_run=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "No commits in the last 24 hours. Skipping Windows build."
        }

    - name: Unshallow vcpkg submodule
      if: steps.recent_changes.outputs.should_run == 'true'
      shell: pwsh
      run: |
        cd external/vcpkg
        git fetch --unshallow 2>$null; if (-not $?) { Write-Host "Already unshallowed or fetch failed (continuing)" }
        exit 0

    - name: Bootstrap vcpkg
      if: steps.recent_changes.outputs.should_run == 'true'
      shell: pwsh
      run: |
        Push-Location external/vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        Pop-Location

    - name: Build (Ninja)
      if: steps.recent_changes.outputs.should_run == 'true'
      shell: cmd
      run: build-windows-ninja.bat ${{ env.BUILD_TYPE }}
