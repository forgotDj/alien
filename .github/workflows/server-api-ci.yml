name: Server API Tests

on:
  push:
    branches: [ develop ]
    paths:
      - 'scripts/ServerNew/**'
      - '.github/workflows/server-api-ci.yml'
  pull_request:
    branches: [ develop ]
    paths:
      - 'scripts/ServerNew/**'
      - '.github/workflows/server-api-ci.yml'

jobs:
  server-api-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scripts/ServerNew

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/ServerNew/tests/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v
